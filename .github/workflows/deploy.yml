name: Deploy Guoan Dashboard to GitHub Pages

on:
  schedule:
    - cron: '30 18 * * *'   # 02:30 北京时间 (after CSL dashboard updates at 02:00)
  workflow_dispatch:          # manual trigger
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Guoan Dashboard
        run: python -m src.guoan_builder
        env:
          CSL_DASHBOARD_SOURCE_URL: https://xxxniconico.github.io/csl-dashboard-2026/dashboard_embed.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
